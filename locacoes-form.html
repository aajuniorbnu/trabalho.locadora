<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/locacoes.css">
  <title>Locações</title>
</head>
<body>

  <header>
  <div class="logo"><span>🚗</span> Locadora</div>
  <div class="header-actions">
    <button class="btn-tema" onclick="toggleTema()" id="theme-toggle-btn">
      <span id="theme-icon">🌙</span> <span id="theme-text">Modo Escuro</span>
    </button>
  </div> 
  </header>

  <aside class="sidebar">
    <nav>
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="locacoes.html" class="active">🚗 Locações</a>
      <a href="veiculos.html">🚙 Veículos</a>
      <a href="clientes.html">👤 Clientes</a>
      <a href="categorias.html">🏷️ Categorias</a>
      <a href="seguros.html">🛡️ Seguros</a>
      <a href="pagamentos.html">💳 Pagamentos</a>
      <a href="conta.html">⚙️ Conta</a>
    </nav>
  </aside>

<main>

  <div class="page-header">
    <div>
      <h1>Locações</h1>
      <p class="page-subtitle">Cadastro e gerenciamento de locações</p>
    </div>
  </div>

  <!-- CARD FORM -->
  <div class="card">
    <div class="card-header">
      <h2>
        <span class="icon-plus">➕</span>
        Nova Locação
      </h2>
      <button class="btn-clear" id="btn-limpar" title="Limpar formulário">✕ Limpar</button>
    </div>

    <form id="form-locacao" class="form-grid">
      
      <div class="form-group">
        <label for="campo-data-inicial">Data Inicial </label>
        <div class="input-wrap">
          <input type="date" id="campo-data-inicial" class="with-icon">
        </div>
      </div>
      
      <div class="form-group">
        <label for="campo-data-final">Data Final *</label>
        <div class="input-wrap">
          <input type="date" id="campo-data-final" class="with-icon">
        </div>
      </div>
      <div class="form-group">
        <label for="campo-id">Id Cliente *</label>
        <div class="input-wrap">
          <input type="number" id="campo-id" class="with-icon" >
        </div>
      </div>
      <div class="form-group">
        <label for="campo-nome">Nome Cliente *</span></label>
        <div class="input-wrap">
          <input type="text" id="campo-nome" class="with-icon" >
        </div>
      </div>
      
  <div class="form-actions">
    <a href="clientes.html" class="btn secondary">Cancelar</a>
    <button type="submit" id="btn-salvar" class="btn primary"> Salvar Cliente</button>
  </div>
      </div>
    </div>
  </form>
  </div
</main>

<script src="js/locacoes-form.js"></script>

</body>
</html>
