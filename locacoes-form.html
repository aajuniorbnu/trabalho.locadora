<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/locacoes.css">
  <title>Locações</title>
</head>
<body>

  <header>
    <div class="logo">🚗 Locadora</div>
    <div class="header-actions">
      <button class="btn-tema" id="theme-toggle">
        <span id="theme-icon">🌙</span>
        <span id="theme-text">Escuro</span>
      </button>
    </div>
  </header>

  <aside class="sidebar">
    <nav>
      <a href="dashboard.html">📊 Dashboard</a>
      <a href="locacoes.html" class="active">🚗 Locações</a>
      <a href="veiculos.html">🚙 Veículos</a>
      <a href="clientes.html">👤 Clientes</a>
    </nav>
  </aside>

<main>

  <div class="page-header">
    <div>
      <h1>Locações</h1>
      <p class="page-subtitle">Cadastro e gerenciamento de locações</p>
    </div>
  </div>
    <div class="card">
    <div class="card-header flex">
      <h2>
        <span class="icon-list">📋</span>
        Locações cadastradas
      </h2>

      <div class="table-toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-locacoes" placeholder="Buscar locação...">
        </div>
        <select id="filtro-status">
          <option value="">Todas</option>
          <option value="ativa">Ativas</option>
          <option value="finalizada">Finalizadas</option>
        </select>
      </div>
    </div>
    <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Veículo</th>
          <th>Categoria</th>
          <th>Valor Dia</th>
          <th>Valor Total</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="lista-locacoes">
        <tr>
          <td>João Silva</td>
          <td>Honda Civic</td>
          <td>Executivo</td>
          <td>R$ 150,00</td>
          <td>R$ 750,00</td>
          <td><span class="status-badge ativo">● Ativa</span></td>
          <td>
            <div class="actions">
              <button class="btn-icon edit" title="Editar" aria-label="Editar locação">✏️</button>
              <button class="btn-icon complete" title="Finalizar" aria-label="Finalizar locação">✓</button>
              <button class="btn-icon del" title="Remover" aria-label="Remover locação">🗑️</button>
            </div>
          </td>
        </tr>

      </tbody>
    </table>
  </div>
  </div>
</body>
</html>
