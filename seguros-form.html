<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locadora PRO - Portfólio</title>
    <link rel="stylesheet" href="/css/veiculos-categoria.css">
    <link rel="stylesheet" href="/css/seguros form.css">
</head>

<body>

    <header>
        <h1>🚗 Locadora de Veículos</h1>
        <div class="busca">
            <input class="input-busca" type="text" name="busca" placeholder="Faça sua Busca">

        </div>
        <button>
            <a href="/login.html">Login</a>
        </button>
        <button class="btn-tema" onclick="toggleTema()">🌗 Tema</button>
    </header>

    <nav class="sidebar">

        <a href="/dashboard.html">Home</a>
        <a href="/categorias.html">Categorias</a>

        <a href="/veiculos.html">Veículos</a>
        <a href="/locacoes.html">Locações</a>

    </nav>
    <main>
<!-- Tipo de seguro (básico, completo)
● Valor mensal
● Cobertura de terceiros (sim/não)
● Assistência 24h (sim/não)
● Contato da seguradora
● Status (ativo/vencido)
● Observações
-->
   <main>

<form id="form-seguro">

    <label>Tipo de Seguro</label>
    <select id="seguro-tipo">
        <option value="">Selecione</option>
        <option value="basico">Básico</option>
        <option value="completo">Completo</option>
    </select>

    <label>Cobertura de terceiros</label>
    <select id="cobertura">
        <option value="">Selecione</option>
        <option value="sim">Sim</option>
        <option value="nao">Não</option>
    </select>

    <label>Assistência 24h</label>
    <select id="assistencia">
        <option value="">Selecione</option>
        <option value="sim">Sim</option>
        <option value="nao">Não</option>
    </select>

    <label>Status</label>
    <select id="status">
        <option value="">Selecione</option>
        <option value="ativo">Ativo</option>
        <option value="vencido">Vencido</option>
    </select>

    <label>Email</label>
    <input type="email" id="email">

    <label>Observações</label>
    <input type="text" id="observacoes">

    <label>Contato da seguradora</label>
    <input type="text" id="contato-seguradora">

    <label>Valor mensal</label>
    <input type="number" id="valor-mes">

    <button type="submit">Salvar</button>

</form>

</main>
        
        
        
<script src="/js/seguros-form.js"></script>

    <script>
        function toggleTema() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('tema', isDark ? 'dark' : 'light');
        }

        (function () {
            if (localStorage.getItem('tema') === 'dark') {
                document.body.classList.add('dark');
            }
        })();
    </script>
</body>

</html>
