<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/clientes.css"> 
  <title>Clientes</title>
</head>

<body>

<header>
  <div class="logo">🚗 Locadora</div>
  <div class="header-actions">
    <button class="btn-tema" id="theme-toggle">
      <span id="theme-icon">🌙</span>
      <span id="theme-text">Escuro</span>
    </button>
  </div>
</header>

<aside class="sidebar">
  <nav>
    <a href="#">📊 Dashboard</a>
    <a href="#">🚗 Locações</a>
    <a href="#" class="active">👤 Clientes</a>
  </nav>
</aside>

<main>

  <!-- HEADER -->
  <div class="page-header">
    <div>
      <h1>Clientes</h1>
      <p class="page-subtitle">Cadastro e gerenciamento de clientes</p>
    </div>
  </div>
      <div class="card">
    <div class="card-header">
      <h2>
        <span class="icon-plus"></span>
        Cadastro de Cliente
      </h2>
      <button id="btn-limpar" class="btn-clear">✕ Limpar</button>
    </div>

<form id="form-cliente" class="form-grid">

  <div class="form-group">
    <label>Nome *</label>
    <input type="text" id="campo-nome">
  </div>

  <div class="form-group">
    <label>CPF *</label>
    <input type="text" id="campo-cpf">
  </div>
  <div class="form-actions">
    <a href="clientes.html" class="btn secondary">Cancelar</a>
    <button type="submit" id="btn-salvar" class="btn primary">💾 Salvar Cliente</button>
  </div>
</form>
    
  <script src="js/cliente-form.js"></script>
</body>
</html>
