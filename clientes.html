<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/clientes.css">
  <title>Clientes</title>
</head>

<body>

<header>
  <div class="logo"><span>🚗</span> Locadora</div>
  <div class="header-actions">
    <button class="btn-tema" onclick="toggleTema()" id="theme-toggle-btn">
      <span id="theme-icon">🌙</span> <span id="theme-text">Modo Escuro</span>
    </button>
  </div>
</header>

<aside class="sidebar">
  <nav>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="locacoes.html">🚗 Locações</a>
    <a href="clientes.html" class="active">👤 Clientes</a>
     <a href="/seguros.html">🔐 Seguros</a>
  </nav>
</aside>

<main>
  <div class="page-header">
    <div>
      <h1>Clientes</h1>
      <p class="page-subtitle">Cadastro e gerenciamento de clientes</p>
    </div>
    <a class="btn secondary" href="clientes-form.html"> ➕ Novo Cliente</a>
  </div>

  <!-- TABELA -->
  <div class="card">
    <div class="card-header">
      <h2>
        <span class="icon-list">📋</span>
        Clientes cadastrados
      </h2>
      <div class="table-toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="Buscar cliente...">
        </div>
      </div>
    </div>


    <div class="table-wrap table-aling">
      <table>
        <thead>
          <tr>
            <th>Id</th>
            <th>Nome</th>
            <th>CPF</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tbody-clientes">
        </tbody>
      </table>
    </div>
  </div>

</main>

<script src="js/cliente.js"></script>

</body>
</html>
