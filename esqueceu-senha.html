<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/esqueceu-senha.css">
    <title>Recuperar senha</title>
</head>

<body>

    <div class="senha-alteracao">
        <h2>Recuperar Senha</h2>
        
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="email@email.com">

        <label for="cpf">CPF</label>
        <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00">

        <label for="senha-nova">Senha nova</label>
        <input type="password" id="senha-nova">

        <label for="senha-confirmar">Senha confirmar</label>
        <input type="password" id="senha-confirmar">

        <button id="redefinir-senha">Redefinir senha</button>

        <a href="login.html">Voltar ao login</a>
    </div>

    <script src="js/esqueceu-senha.js"></script>
</body>

</html>
