<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/login.css">
    <title>Login</title>
</head>

<body>

    <header>
        <div class="logo">🚗<span id="header-text">Locadora de Veículos</span></div>
        <div class="header-actions">
            <button class="btn-tema" onclick="toggleTema()" id="theme-toggle-btn">
                <span id="theme-icon">🌙</span> <span id="theme-text">Modo Escuro</span>
            </button>
        </div>
    </header>

    <div class="login-card">
        <h2>Entrar no Sistema</h2>

        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="email@email.com">

        <label for="senha">Senha</label>
        <input type="password" id="senha">

        <button id="entrar">Entrar</button>

        <a href="esqueceu-senha.html">Esqueceu a senha?</a>
    </div>

    <script src="js/login.js"></script>
</body>

</html>
