<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Categorias</title>
<link rel="stylesheet" href="../css/veiculos-categoria.css">
</head>
<body>

<header>
  <h1>🚗 Locadora de Veículos</h1>
  <button onclick="toggleTema()">🌙 / ☀️</button>
</header>

<main>
  <h2>Categorias</h2>

  <div class="form">
    <input type="text" id="nome" placeholder="Nome da categoria">
    <input type="text" id="descricao" placeholder="Descrição">
    <button onclick="salvarCategoria()">Salvar</button>
  </div>

  <div id="mensagem"></div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Nome</th>
        <th>Descrição</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody id="tabelaCategorias"></tbody>
  </table>
</main>

<script>
function toggleTema() {
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('tema', isDark ? 'dark' : 'light');
}

(function(){
  if(localStorage.getItem('tema') === 'dark') {
    document.body.classList.add('dark');
  }
})();
</script>

<script src="js/categorias.js"></script>
</body>
</html>
