<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/pagamentos.css">
  <title>Pagamentos</title>
</head>
<body>

<header>
  <div class="logo"><span>🚗</span> Locadora</div>
  <div class="header-actions">
    <button class="btn-tema" onclick="toggleTema()" id="theme-toggle-btn">
      <span id="theme-icon">🌙</span> <span id="theme-text">Modo Escuro</span>
    </button>
  </div>
</header>

    <aside class="sidebar">
        <nav>
        <a href="dashboard.html" >📊 Dashboard</a>
        <a href="locacoes.html" >🚗 Locações</a>
        <a href="veiculos.html">🚙 Veículos</a>
        <a href="clientes.html">👤 Clientes</a>
        <a href="categorias.html" >🏷️ Categorias</a>
        <a href="seguros.html">🛡️ Seguros</a>
        <a href="pagamentos.html" class="active">💳 Pagamentos</a>
        <a href="conta.html">⚙️ Conta</a>
        </nav>
    </aside>

<main>

  <div class="page-header">
    <div>
      <h1>Pagamentos</h1>
      <p class="page-subtitle">Gerenciamento de pagamentos de locações</p>
    </div>
    <a class="btn secondary" href="pagamentos-form.html"> ➕ Novo Pagamento</a>
  </div>
    <div class="card">
    <div class="card-header flex">
      <h2>
        <span class="icon-list">💰</span>
        Pagamentos registrados
      </h2>

      <div class="table-toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-pagamentos" placeholder="Buscar pagamento...">
        </div>
        <div class="filter-wrap">
          <select id="filter-status" class="filter-select">
            <option value="">Status</option>
            <option value="pago">✅ Pago</option>
            <option value="pendente">⏳ Pendente</option>
            <option value="atrasado">❌ Atrasado</option>
          </select>
        </div>
      </div>
    </div>
    <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Id</th>
          <th>Cliente</th>
          <th>Valor</th>
          <th>Data de Vencimento</th>
          <th>Data de Pagamento</th>
          <th>Status</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="lista-pagamentos">
      </tbody>
    </table>
  </div>
  </div>
  <script src="js/pagamentos.js"></script>

</body>
</html>
