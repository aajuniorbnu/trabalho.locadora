<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Cadastro de Veículo</title>
<link rel="stylesheet" href="css/veiculos-categoria.css">
</head>
<body>

<header>
  <div class="header-brand">
    <div class="header-logo">🚗</div>
    <span>Locadora</span>
  </div>
</header>

<aside class="sidebar">
  <nav>
    <a href="/veiculos.html">🚗 Veículos</a>
  </nav>
</aside>

<main>

  <div class="page-header">
    <div>
      <div class="page-title">Cadastro</div>
      <div class="page-subtitle">Novo veículo</div>
    </div>
  </div>

  <div class="card">

    <div class="card-header">
      <div class="card-title">➕ Veículo</div>
    </div>

    <div class="card-body">

      <div class="form-row">
        <div class="form-group">
          <label>Modelo *</label>
          <input id="modelo">
        </div>

        <div class="form-group">
          <label>Placa</label>
          <input id="placa">
        </div>

        <div class="form-group">
          <label>Ano *</label>
          <input type="number" id="ano">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Categoria</label>
          <select id="categoriaId"></select>
        </div>

        <div class="form-group">
          <label>Combustível</label>
          <select id="combustivel">
            <option value="">Selecione</option>
            <option value="flex">Flex</option>
            <option value="gasolina">Gasolina</option>
          </select>
        </div>

        <div class="form-group">
          <label>Status</label>
          <select id="status">
            <option value="ativo">Ativo</option>
            <option value="inativo">Inativo</option>
          </select>
        </div>
      </div>

    </div>

    <div class="form-actions">
      <button id="btn-salvar" class="btn btn-primary">💾 Salvar</button>
      <button onclick="voltar()" class="btn btn-ghost">Cancelar</button>
    </div>

  </div>

</main>

<script src="/js/veiculos-form.js"></script>
</body>
</html>
