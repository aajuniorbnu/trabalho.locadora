<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/pagamentos-form.css">
  <title>Pagamentos</title>
</head>

<body>

<header>
  <div class="logo"><span>🚗</span> Locadora</div>
  <div class="header-actions">
    <button class="btn-tema" onclick="toggleTema()" id="theme-toggle-btn">
      <span id="theme-icon">🌙</span> <span id="theme-text">Modo Escuro</span>
    </button>
  </div>
</header>

<aside class="sidebar">
  <nav>
    <a href="dashboard.html">📊 Dashboard</a>
    <a href="locacoes.html">🚗 Locações</a>
    <a href="pagamentos.html" class="active">💳 Pagamentos</a>
    <a href="veiculos.html">🚙 Veículos</a>
    <a href="clientes.html">👤 Clientes</a>
  </nav>
</aside>

<main>

  <div class="page-header">
    <div>
      <h1>Pagamentos</h1>
      <p class="page-subtitle">Cadastro e gerenciamento de pagamentos</p>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>
        <span class="icon-plus"></span>
        Cadastro de Pagamento
      </h2>
      <button class="btn-clear" id="btn-limpar" title="Limpar formulário">✕ Limpar</button>
    </div>

    <form id="form-pagamento" class="form-grid">

      <div class="form-group">
        <label>ID Locação *</label>
        <input type="text" id="campo-id-locacao">
      </div>

      <div class="form-group">
        <label>Cliente *</label>
        <input type="text" id="campo-cliente">
      </div>

      <div class="form-group">
        <label>Valor *</label>
        <input type="number" id="campo-valor" step="0.01">
      </div>

      <div class="form-group">
        <label>Data de Vencimento *</label>
        <input type="date" id="campo-data-vencimento">
      </div>

      <div class="form-group">
        <label>Data de Pagamento</label>
        <input type="date" id="campo-data-pagamento">
      </div>

      <div class="form-actions">
        <a href="pagamentos.html" class="btn secondary">Cancelar</a>
        <button type="submit" id="btn-salvar" class="btn primary">💾 Salvar Pagamento</button>
      </div>
    </form>

  </div>

</main>

<script src="js/pagamentos-form.js"></script>

</body>
</html>
