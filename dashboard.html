<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Locadora PRO - Portfólio</title>
<link rel="stylesheet" href="/css/veiculos-categoria.css">
</head>
<body>

<header>
  <h1>🚗 Locadora de Veículos</h1>
  <button onclick="toggleTema()">🌙 / ☀️</button>
</header>

<nav class="sidebar">
  <a href="/categorias.html">Categorias</a>
  <a href="/veiculos.html">Veículos</a>
  <a href="/locacoes.html">Locações</a>
  <a href="/login.html" id="fazer-login">Fazer login</a>
  <a href="/conta.html" id="login-feito" style="display: none;">Minha conta</a>

</nav>

<main>
  <h2>Bem-vindo ao sistema</h2>
  <p>Gerencie categorias e veículos </p>
</main>

<script>
function toggleTema() {
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('tema', isDark ? 'dark' : 'light');
}

(function(){
  if(localStorage.getItem('tema') === 'dark') {
    document.body.classList.add('dark');
  }
})();

const logado = localStorage.getItem("logado");

if (logado === "true") {
    document.getElementById("fazer-login").style.display = "none";
    document.getElementById("login-feito").style.display = "flex";
  } else {
    document.getElementById("fazer-login").style.display = "flex";
    document.getElementById("login-feito").style.display = "none";
}
</script>

</body>
</html>
