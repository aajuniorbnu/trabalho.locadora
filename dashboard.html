<script src="/js/dashboard.js"></script>
<script>
function toggleTema() {
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('tema', isDark ? 'dark' : 'light');
}

    (function () {
      if (localStorage.getItem('tema') === 'dark') {
        document.body.classList.add('dark');
      }
    })();

    const logado = localStorage.getItem("logado");

    if (logado === "true") {
      document.getElementById("fazer-login").style.display = "none";
      document.getElementById("login-feito").style.display = "flex";
    } else {
      document.getElementById("fazer-login").style.display = "flex";
      document.getElementById("login-feito").style.display = "none";
    }
  </script>

</body>
